@if (loading) 
{
    <div class="spinner">Loading...</div>
}

@if (error) 
{
    <div class="error">{{ error }}</div>
}

@if (!loading && !error) 
{
    <div class="menu-grid">
    @for (item of menuItems; track item.menu_item_id) 
    {
        <app-menu-item 
            [menuItem]="item"
            (itemClicked)="onItemClicked($event)">
        </app-menu-item>
    }
    </div>
}
